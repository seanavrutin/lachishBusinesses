services:
  server:
    build: .
    container_name: lachish-businesses-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override paths so they point at the mounted volumes inside the container.
      - NODE_ENV=production
      - WA_AUTH_DIR=/app/auth
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/serviceAccount.json
    ports:
      # Host:container, both driven by PORT in .env (defaults to 3000).
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      # Persist the WhatsApp session so re-deploys don't force re-linking.
      - ./auth:/app/auth
      # Provide the Firebase service-account key (read-only).
      - ./secrets:/app/secrets:ro
      # Persist the audit log on the host so it survives container re-creates.
      - ./logs:/app/logs
